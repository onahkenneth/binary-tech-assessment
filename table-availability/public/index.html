<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary ITS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        h1 {
            padding: 1rem;
        }

        object {
            display: block;
            width: 100%;
            height: calc(100vh - 60px);
        }
    </style>
</head>

<body>
    <h1>Technical Assessment Document</h1>
    <object data="Technical_Assessment_V3.pdf" type="application/pdf" width="100%" height="100%">
        <p>It appears you don't have a PDF plugin for this browser.
            No biggie... you can <a href="Technical_Assessment_V3.pdf">click here to download the PDF file.</a>
        </p>
    </object>
</body>

</html>
